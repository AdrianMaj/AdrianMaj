name: Update README cards

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin payload-lexical-typography
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=AdrianMaj&repo=payload-lexical-typography&theme=dark
          path: profile/pin-payload-lexical-typography.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin payload-ecommerce-template
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=Mandala-Software-House&repo=payload-ecommerce-template&theme=dark
          path: profile/pin-payload-ecommerce-template.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin adrianmaj.com
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=AdrianMaj&repo=adrianmaj.com&theme=dark
          path: profile/pin-adrianmajcom.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          git push
